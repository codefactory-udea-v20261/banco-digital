sonar.projectKey=banco-digital-core-banking
sonar.projectName=Banco Digital - Core Banking Service
sonar.projectVersion=${project.version}
sonar.organization=codefactory-udea-v20261

# Sources
sonar.sources=src/main
sonar.tests=src/test
sonar.test.inclusions=**/*Test.java,**/*Tests.java,**/*IT.java

# Coverage
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.coverageReportPath=target/site/jacoco/jacoco.xml

# Coverage thresholds
sonar.coverage.exclusions=**/*Configuration.java,**/*Config.java
sonar.projectBaseDir=.

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=17

# Exclusions
sonar.exclusions=**/target/**,**/docs/**
