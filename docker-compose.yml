version: '3.8'

services:
  # PostgreSQL Database (shared)
  postgres:
    image: postgres:16-alpine
    container_name: banco-digital-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_MULTIPLE_DATABASES: banco_digital_core,banco_digital_identity,banco_digital_audit,banco_digital_reporting
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - banco-digital-network

  # Core Banking Service
  core-banking:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: core-banking
        JAR_FILE: target/banco-digital-core-banking-0.0.1-SNAPSHOT.jar
    container_name: banco-digital-core-banking
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banco_digital_core
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      IDENTITY_SERVICE_URL: http://identity:8081
      AUDIT_SERVICE_URL: http://audit:8082
      REPORTING_SERVICE_URL: http://reporting:8083
      JWT_SECRET: dev_secret_replace_in_prod_must_be_256bits
      JWT_EXPIRATION_MS: 3600000
      APP_PROFILE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco-digital-network
    restart: unless-stopped

  # Identity Service
  identity:
    build:
      context: ../banco-digital-identity
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: identity
        JAR_FILE: target/banco-digital-identity-0.0.1-SNAPSHOT.jar
    container_name: banco-digital-identity
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banco_digital_identity
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      JWT_SECRET: dev_secret_replace_in_prod_must_be_256bits
      JWT_EXPIRATION_MS: 3600000
      APP_PORT: 8081
      APP_PROFILE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco-digital-network
    restart: unless-stopped

  # Audit Service
  audit:
    build:
      context: ../banco-digital-audit
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: audit
        JAR_FILE: target/banco-digital-audit-0.0.1-SNAPSHOT.jar
    container_name: banco-digital-audit
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banco_digital_audit
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      JWT_SECRET: dev_secret_replace_in_prod_must_be_256bits
      JWT_EXPIRATION_MS: 3600000
      APP_PORT: 8082
      APP_PROFILE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco-digital-network
    restart: unless-stopped

  # Reporting Service
  reporting:
    build:
      context: ../banco-digital-reporting
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: reporting
        JAR_FILE: target/banco-digital-reporting-0.0.1-SNAPSHOT.jar
    container_name: banco-digital-reporting
    ports:
      - "8083:8083"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: banco_digital_reporting
      DB_USERNAME: postgres
      DB_PASSWORD: admin
      JWT_SECRET: dev_secret_replace_in_prod_must_be_256bits
      JWT_EXPIRATION_MS: 3600000
      APP_PORT: 8083
      APP_PROFILE: local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - banco-digital-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  banco-digital-network:
    driver: bridge