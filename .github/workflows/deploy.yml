name: Deploy to GKE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: "project-2183efe1-b87d-4c12-966"
  GKE_CLUSTER: "banco-digital-cluster"
  GKE_ZONE: "us-central1"
  IMAGE: "banco-digital"
  NAMESPACE: "banco-digital"

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Configure Docker'
        run: |-
          gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: 'Build and Push Docker Image'
        run: |-
          docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/microservices-repo/$IMAGE:$GITHUB_SHA .
          docker push us-central1-docker.pkg.dev/$PROJECT_ID/microservices-repo/$IMAGE:$GITHUB_SHA

      - name: 'Set up GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: '${{ env.GKE_CLUSTER }}'
          location: '${{ env.GKE_ZONE }}'

      - name: 'Create Kubernetes Secret'
        run: |-
          kubectl create secret generic banco-digital-secrets \
            --namespace $NAMESPACE \
            --from-literal=jwt-secret="${{ secrets.JWT_SECRET }}" \
            --from-literal=encryption-key="${{ secrets.ENCRYPTION_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 'Deploy to GKE'
        run: |-
          # Update image in deployment
          sed -i "s|image: .*|image: us-central1-docker.pkg.dev/$PROJECT_ID/microservices-repo/$IMAGE:$GITHUB_SHA|g" k8s/deployment.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/$IMAGE --namespace $NAMESPACE
