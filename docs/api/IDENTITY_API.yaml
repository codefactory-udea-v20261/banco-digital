openapi: 3.0.3
info:
  title: Banco Digital - Identity API
  description: API para autenticacion, emision y revocacion de tokens JWT, y provisionamiento de accesos.
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/login:
    post:
      tags:
        - Autenticacion
      summary: Iniciar sesion y obtener token JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                correo:
                  type: string
                clave:
                  type: string
                mfaCode:
                  type: string
      responses:
        '200':
          description: Autenticacion exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
  /api/v1/auth/logout:
    post:
      tags:
        - Autenticacion
      summary: Revocar token JWT actual
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Token revocado exitosamente
  /api/v1/auth/me:
    get:
      tags:
        - Autenticacion
      summary: Consultar identidad autenticada
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Datos del usuario autenticado devueltos exitosamente
  /api/v1/internal/users/provision-client-access:
    post:
      tags:
        - Autenticacion Interna
      summary: Aprovisionar acceso de un nuevo cliente desde el core bancario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clienteId:
                  type: string
                  format: uuid
                email:
                  type: string
      responses:
        '201':
          description: Acceso aprovisionado

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
