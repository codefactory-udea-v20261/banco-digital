spring:
  cloud:
    vault:
      enabled: false
    config:
      enabled: false
  jpa:
    show-sql: false

# Disable Eureka for Cloud Run
eureka:
  client:
    enabled: false
    registerWithEureka: false
    fetchRegistry: false

# Disable Kafka consumers for Cloud Run
spring.kafka:
  bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  listener:
    auto-startup: false

spring.cloud.stream:
  kafka:
    binder:
      auto-startup: false

logging:
  level:
    root: WARN
    com.udea.bancodigital: INFO

server:
  error:
    include-message: never
    include-stacktrace: never

# Identity service URL for inter-service communication
services:
  identity-service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  audit:
    url: ${AUDIT_SERVICE_URL:http://localhost:8082}

# Disable tracing/zipkin in Cloud Run
management:
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
