spring:
  cloud:
    vault:
      enabled: false
    config:
      enabled: false
    discovery:
      enabled: false
    loadbalancer:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 1s
      timeout: 1s
  jpa:
    show-sql: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    consumer:
      auto-startup: false

# Disable Eureka for Cloud Run
eureka:
  client:
    enabled: false
    registerWithEureka: false
    fetchRegistry: false

logging:
  level:
    root: WARN
    com.udea.bancodigital: INFO

server:
  port: ${PORT:8080}
  error:
    include-message: never
    include-stacktrace: never

# Identity service URL for inter-service communication
services:
  identity-service:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  audit:
    url: ${AUDIT_SERVICE_URL:http://localhost:8082}

# Disable tracing/zipkin in Cloud Run
management:
  tracing:
    enabled: false
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
    diskspace:
      enabled: false
    binders:
      enabled: false
