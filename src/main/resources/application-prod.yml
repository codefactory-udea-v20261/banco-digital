spring:
  datasource:
    url: jdbc:postgresql:///${DB_NAME:banco_digital_core}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory&user=${DB_USERNAME:core_user}&password=${DB_PASSWORD:CoreBanking123!}
