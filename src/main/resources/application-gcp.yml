spring:
  application:
    name: banco-digital-core-banking
  jpa:
    hibernate:
      ddl-auto: validate  # Use Flyway for migrations
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
  
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  # Cloud SQL Proxy (for Cloud Run)
  cloud:
    gcp:
      sql:
        database-name: ${DB_NAME}
        instance-connection-name: ${GCP_CLOUD_SQL_INSTANCE}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:kafka:9092}
    producer:
      acks: all
      retries: 3
    consumer:
      group-id: banco-digital-group

  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    timeout: 60000
    lettuce:
      pool:
        max-active: 20
        max-idle: 10

logging:
  level:
    root: INFO
    com.udea.bancodigital: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
