spring:
  application:
    name: core-banking-service
  profiles:
    active: ${APP_PROFILE:local}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco_digital_core}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Eureka Service Discovery
  eureka:
    client:
      serviceUrl:
        defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      registerWithEureka: true
      fetchRegistry: true
    instance:
      instanceId: ${spring.application.name}:${server.port}
      preferIpAddress: true
      leaseRenewalIntervalInSeconds: 30
      leaseExpirationDurationInSeconds: 90

  # Kafka Configuration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ${spring.application.name}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: true

  # Distributed Tracing
  zipkin:
    base-url: ${ZIPKIN_URL:http://localhost:9411/}
    enabled: true
  sleuth:
    sampler:
      probability: 1.0

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      identity-service:
        # Circuit breaker opens when 50%+ calls fail in 10-request window
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        slowCallRateThreshold: 50
        slowCallDurationThreshold: 2000
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        # Wait 5 seconds before transitioning to HALF_OPEN
        waitDurationInOpenState: 5000
        eventConsumerBufferSize: 10

  retry:
    instances:
      identity-service:
        maxAttempts: 3
        # Exponential backoff: 1s, 2s, 4s
        waitDuration: 1000
        intervalFunction: exponential
        multiplier: 2.0
        randomizedWaitDuration: false

  bulkhead:
    instances:
      identity-service:
        maxConcurrentCalls: 20
        maxWaitDuration: 10000

server:
  port: ${PORT:${APP_PORT:8080}}
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# External Services URLs
services:
  identity:
    url: ${IDENTITY_SERVICE_URL:http://localhost:8081}
  audit:
    url: ${AUDIT_SERVICE_URL:http://localhost:8082}

app:
  security:
    jwt:
      secret: ${JWT_SECRET:dev_secret_replace_in_prod_must_be_256bits}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}
    login:
      max-failed-attempts: ${LOGIN_MAX_FAILED_ATTEMPTS:3}
      lockout-minutes: ${LOGIN_LOCKOUT_MINUTES:15}
    default-client-password: ${DEFAULT_CLIENT_PASSWORD:Temp1234!}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}
  api:
    version: v1

---

# Vault Profile - Secrets loaded from Vault
spring:
  config:
    activate:
      on-profile: vault
  datasource:
    username: ${vault.datasource.username:postgres}
    password: ${vault.datasource.password:admin}

app:
  security:
    jwt:
      secret: ${jwt_secret:dev_secret_replace_in_prod_must_be_256bits}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
      refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:86400000}

