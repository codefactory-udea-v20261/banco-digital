spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate.default_schema: public
  flyway:
    enabled: false
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    refresh:
      enabled: false
    gcp:
      sql:
        enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

eureka:
  client:
    enabled: false
  instance:
    enabled: false

services:
  identity:
    url: http://localhost:8081
  audit:
    url: http://localhost:8082

jwt:
  secret: "9a4fbc6615a206829774619712a4c88f6a9170e17625148011f0a207271d533b"

management:
  endpoints:
    enabled-by-default: false
