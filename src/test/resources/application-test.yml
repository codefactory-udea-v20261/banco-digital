spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco_digital_test}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:test_password}
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false

eureka:
  client:
    enabled: false
  instance:
    enabled: false

spring.cloud.vault:
  enabled: false

jwt:
  secret: ${JWT_SECRET:ci_test_secret_replace_in_prod_256bits}

services:
  identity:
    url: http://localhost:8081
